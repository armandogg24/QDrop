<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="qdrop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0b0f19" />
  <!-- Glow ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#qdrop-grad)" stroke-width="8" opacity="0.3" filter="url(#glow)" />
  <!-- Inner circles -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#qdrop-grad)" stroke-width="12" stroke-dasharray="10 30" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#qdrop-grad)" stroke-width="6" opacity="0.5" />
  <!-- Drop Arrow / Waves -->
  <path d="M256,150 L256,310 M220,270 L256,310 L292,270" fill="none" stroke="url(#qdrop-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M180,350 Q256,390 332,350" fill="none" stroke="url(#qdrop-grad)" stroke-width="16" stroke-linecap="round" />
</svg>
